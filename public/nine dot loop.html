
<style>
  #wrap { display:flex; justify-content:center; padding:2rem 0; }
</style>
<h2 class="sr-only">9-dot problem solution animating in a continuous loop</h2>
<div id="wrap">
  <svg width="320" height="320" viewBox="0 0 160 160">
    <defs>
      <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <g id="lines"></g>
    <g id="dots">
      <circle cx="20" cy="20" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
      <circle cx="60" cy="20" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
      <circle cx="100" cy="20" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
      <circle cx="20" cy="60" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
      <circle cx="60" cy="60" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
      <circle cx="100" cy="60" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
      <circle cx="20" cy="100" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
      <circle cx="60" cy="100" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
      <circle cx="100" cy="100" r="4" fill="var(--color-text-primary)" opacity="0.8"/>
    </g>
    <circle id="pencil" r="4" fill="none" stroke="#EF9F27" stroke-width="2" opacity="0"/>
  </svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const linesG = document.getElementById('lines');
const pencil = document.getElementById('pencil');

const segments = [
  { from:{x:140,y:140}, to:{x:20,y:20},  color:'#EF9F27' },
  { from:{x:20,y:20},   to:{x:140,y:20}, color:'#5DCAA5' },
  { from:{x:140,y:20},  to:{x:20,y:140}, color:'#7F77DD' },
  { from:{x:20,y:140},  to:{x:20,y:20},  color:'#D85A30' },
];

function makeLine(seg) {
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1', seg.from.x); l.setAttribute('y1', seg.from.y);
  l.setAttribute('x2', seg.from.x); l.setAttribute('y2', seg.from.y);
  l.setAttribute('stroke', seg.color);
  l.setAttribute('stroke-width', '2');
  l.setAttribute('stroke-linecap', 'round');
  l.setAttribute('marker-end', 'url(#ah)');
  linesG.appendChild(l);
  return l;
}

function runCycle() {
  linesG.innerHTML = '';
  const lines = segments.map(makeLine);
  gsap.set(pencil, { attr:{ cx:segments[0].from.x, cy:segments[0].from.y, opacity:1 } });

  const tl = gsap.timeline({ onComplete: () => {
    gsap.to(pencil, { attr:{ opacity:0 }, duration:0.3, onComplete: () => {
      gsap.delayedCall(0.5, runCycle);
    }});
  }});

  segments.forEach((seg, i) => {
    tl.to(lines[i], {
      attr:{ x2:seg.to.x, y2:seg.to.y },
      duration: 1.0,
      ease: 'power2.inOut',
    }, i === 0 ? '+=0.3' : '+=0.15');
    tl.to(pencil, {
      attr:{ cx:seg.to.x, cy:seg.to.y },
      duration: 1.0,
      ease: 'power2.inOut'
    }, '<');
  });
}

runCycle();
</script>
